<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Reaction Time Training</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
      padding: 20px;
      margin: 0;
    }

    .game-card {
      background: rgba(245, 240, 255, 0.7);
      backdrop-filter: blur(2px);
      border-radius: 2rem;
      width: 100%;
      max-width: 1300px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.03), 0 1px 2px rgba(0,0,0,0.02);
      padding: 1.2rem;
      border: 1px solid #e2ddf5;
    }

    .stats-header {
      background: #f1e9ff;
      border-radius: 1.8rem;
      padding: 0.7rem 1.5rem;
      margin-bottom: 1rem;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
    }

    .timer-box {
      background: #ffffffcc;
      padding: 0.3rem 1.2rem;
      border-radius: 3rem;
      font-family: monospace;
      font-weight: 700;
      font-size: 1.4rem;
      color: #6b5b8c;
      backdrop-filter: blur(2px);
    }

    .dot-progress {
      background: #e9e0fc;
      border-radius: 2rem;
      padding: 0.3rem 1rem;
      min-width: 160px;
      text-align: center;
    }

    .dot-counter {
      font-size: 1.4rem;
      font-weight: 700;
      color: #5e4b7c;
    }

    .progress-bars {
      margin-bottom: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .progress-item {
      background: #f5efff;
      border-radius: 1rem;
      padding: 0.2rem 0.8rem;
    }

    .progress-label {
      font-size: 0.7rem;
      font-weight: 600;
      color: #7c6a9e;
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.2rem;
    }

    .progress-bar-bg {
      background: #ddd4ec;
      border-radius: 40px;
      height: 10px;
      overflow: hidden;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      transition: width 0.07s linear;
      border-radius: 40px;
    }

    .dots-fill { background: #a98cd9; }
    .time-fill { background: #f0b27a; }

    .stage-control {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      align-items: center;
      margin-bottom: 1rem;
    }

    .select-stage-btn {
      background: #cbbff0;
      border: none;
      padding: 0.5rem 1.4rem;
      border-radius: 3rem;
      font-weight: 600;
      color: #4b3a66;
      cursor: pointer;
      font-size: 0.9rem;
      transition: 0.1s;
    }

    .start-stage-btn {
      background: #b5d3b1;
      border: none;
      padding: 0.5rem 1.6rem;
      border-radius: 3rem;
      font-weight: 600;
      color: #3b5a3a;
      cursor: pointer;
      font-size: 0.9rem;
      transition: 0.1s;
    }

    .start-stage-btn.hidden {
      display: none;
    }

    .level-menu {
      background: #f7f2ffdd;
      backdrop-filter: blur(8px);
      border-radius: 1.8rem;
      padding: 1rem;
      margin-bottom: 1rem;
      display: none;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 0.8rem;
    }

    .level-menu.show {
      display: grid;
    }

    .level-card {
      background: #fffcf5;
      border-radius: 1.4rem;
      padding: 0.6rem;
      text-align: center;
      cursor: pointer;
      transition: 0.1s;
      box-shadow: 0 1px 6px rgba(0,0,0,0.03);
    }

    .level-card.active-level {
      background: #e2d1ff;
      border: 1px solid #b79eff;
    }

    .level-name {
      font-weight: 700;
      color: #5b487a;
    }

    .level-detail {
      font-size: 0.7rem;
      color: #8d7aad;
    }

    .game-arena {
      position: relative;
      background: #ffffff;
      border-radius: 1.5rem;
      min-height: 460px;
      height: 54vh;
      width: 100%;
      border: 1px solid #e7def5;
      box-shadow: inset 0 0 0 1px #faf5ff, 0 2px 8px rgba(0,0,0,0.02);
      cursor: crosshair;
      overflow: hidden;
    }

    .target-dot {
      position: absolute;
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.05s ease;
      z-index: 20;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .target-dot:hover {
      transform: scale(1.02);
    }

    .action-row {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-top: 1rem;
    }

    .game-btn {
      background: #e0d6f0;
      border: none;
      padding: 0.45rem 1.3rem;
      border-radius: 3rem;
      font-weight: 600;
      color: #5a4875;
      cursor: pointer;
    }

    .popup-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.2);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      visibility: hidden;
      opacity: 0;
      transition: 0.12s ease;
    }

    .popup-overlay.active {
      visibility: visible;
      opacity: 1;
    }

    .popup-card {
      background: #ffffffea;
      border-radius: 2rem;
      padding: 1.5rem;
      text-align: center;
      max-width: 320px;
      box-shadow: 0 12px 28px rgba(0,0,0,0.1);
    }

    .popup-card h3 {
      color: #b1624b;
      margin-bottom: 0.8rem;
      font-weight: 600;
    }

    .popup-card p {
      color: #5b4c6e;
      margin-bottom: 1rem;
    }

    .popup-buttons {
      display: flex;
      gap: 0.8rem;
      justify-content: center;
      margin-top: 0.5rem;
    }

    .popup-btn {
      padding: 0.5rem 1rem;
      border-radius: 3rem;
      border: none;
      font-weight: 600;
      cursor: pointer;
    }

    .restart-popup-btn {
      background: #b7c9e2;
      color: #2f4858;
    }

    .change-stage-popup-btn {
      background: #eedb9b;
      color: #6b4c2c;
    }

    .next-stage-btn {
      background: #a5d6a5;
      color: #2c5e2c;
    }

    .info-text {
      text-align: center;
      margin-top: 0.6rem;
      font-size: 0.7rem;
      color: #9080b0;
    }

    @media (max-width: 680px) {
      .timer-box { font-size: 1rem; padding: 0.2rem 0.8rem; }
      .dot-counter { font-size: 1.2rem; }
      .game-arena { min-height: 380px; height: 48vh; }
      .level-menu { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
<div class="game-card">
  <div class="stats-header">
    <div class="timer-box" id="liveTimer">00:00:00</div>
    <div class="dot-progress">
      <span>dots caught</span>
      <div class="dot-counter" id="dotsCounter">0 / <span id="targetDotsSpan">0</span></div>
    </div>
  </div>

  <div class="progress-bars">
    <div class="progress-item">
      <div class="progress-label"><span>stage progress</span><span id="dotsPercentLabel">0%</span></div>
      <div class="progress-bar-bg"><div class="progress-fill dots-fill" id="dotsProgressFill"></div></div>
    </div>
    <div class="progress-item">
      <div class="progress-label"><span>time remaining</span><span id="timePercentLabel">0%</span></div>
      <div class="progress-bar-bg"><div class="progress-fill time-fill" id="timeProgressFill"></div></div>
    </div>
  </div>

  <div class="stage-control">
    <button id="selectStageBtn" class="select-stage-btn">select stage</button>
    <button id="startStageBtn" class="start-stage-btn hidden">start game</button>
  </div>

  <div id="levelMenu" class="level-menu"></div>
  <div id="gameArena" class="game-arena"></div>

  <div class="action-row">
    <button id="pauseGameBtn" class="game-btn">pause</button>
    <button id="restartStageBtn" class="game-btn">restart stage</button>
  </div>
  <div id="infoMsg" class="info-text">pick a stage → start game. catch dots before time runs out. timer resets after each catch.</div>
</div>

<div id="lossPopup" class="popup-overlay">
  <div class="popup-card">
    <h3>time's up</h3>
    <p>progress reset for this stage.</p>
    <div class="popup-buttons">
      <button id="popupRestartBtn" class="popup-btn restart-popup-btn">try again</button>
      <button id="popupChangeStageBtn" class="popup-btn change-stage-popup-btn">change stage</button>
    </div>
  </div>
</div>

<div id="congratsPopup" class="popup-overlay">
  <div class="popup-card" id="congratsCard">
    <h3 id="congratsTitle">stage complete!</h3>
    <p id="congratsMessage">you've passed this stage, move on to the next stage!</p>
    <div class="popup-buttons" id="congratsButtons">
      <button id="nextStageBtn" class="popup-btn next-stage-btn">next stage →</button>
      <button id="congratsChangeStageBtn" class="popup-btn change-stage-popup-btn">change stage</button>
    </div>
  </div>
</div>

<script>
  const STAGES = [
    { name: "beginner",   timeLimitSec: 5.0, requiredDots: 5, minSize: 26, maxSize: 48 },
    { name: "advance",    timeLimitSec: 3.0, requiredDots: 9, minSize: 18, maxSize: 38 },
    { name: "sweat",      timeLimitSec: 2.2, requiredDots: 14, minSize: 12, maxSize: 28 },
    { name: "unlimited",  timeLimitSec: 1.5, requiredDots: 999, minSize: 7, maxSize: 22 }
  ];

  const gameArena = document.getElementById('gameArena');
  const liveTimerSpan = document.getElementById('liveTimer');
  const dotsCounterSpan = document.getElementById('dotsCounter');
  const targetDotsSpan = document.getElementById('targetDotsSpan');
  const dotsProgressFill = document.getElementById('dotsProgressFill');
  const timeProgressFill = document.getElementById('timeProgressFill');
  const dotsPercentLabel = document.getElementById('dotsPercentLabel');
  const timePercentLabel = document.getElementById('timePercentLabel');
  const selectStageBtn = document.getElementById('selectStageBtn');
  const startStageBtn = document.getElementById('startStageBtn');
  const levelMenuDiv = document.getElementById('levelMenu');
  const pauseBtn = document.getElementById('pauseGameBtn');
  const restartStageBtn = document.getElementById('restartStageBtn');
  const infoMsg = document.getElementById('infoMsg');
  const lossPopup = document.getElementById('lossPopup');
  const popupRestart = document.getElementById('popupRestartBtn');
  const popupChangeStage = document.getElementById('popupChangeStageBtn');
  const congratsPopup = document.getElementById('congratsPopup');
  const congratsTitle = document.getElementById('congratsTitle');
  const congratsMessage = document.getElementById('congratsMessage');
  const nextStageBtn = document.getElementById('nextStageBtn');
  const congratsChangeStageBtn = document.getElementById('congratsChangeStageBtn');

  let currentStageIdx = null; 
  let requiredDots = 0;
  let currentTimeLimitMs = 0;
  let dotsFound = 0;
  let isGameActive = false;
  let isPaused = false;
  let roundStartTime = 0;
  let elapsedBeforePause = 0;
  let timerInterval = null;
  let currentDot = null;

  function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

  function getRandomPastelColor() {
    const hue = rand(0, 360);
    return `hsl(${hue}, 70%, 70%)`;
  }

  function getDotSize() {
    const stage = STAGES[currentStageIdx];
    return rand(stage.minSize, stage.maxSize);
  }

  function getRandomCoordinate(dotSize) {
    const maxX = Math.max(0, gameArena.clientWidth - dotSize);
    const maxY = Math.max(0, gameArena.clientHeight - dotSize);
    if (maxX <= 0 || maxY <= 0) return { x: 12, y: 12 };
    return { x: rand(0, maxX), y: rand(0, maxY) };
  }

  function removeDot() {
    if (currentDot) {
      currentDot.removeEventListener('click', dotClickHandler);
      currentDot.remove();
      currentDot = null;
    }
  }

  function spawnDot() {
    removeDot();
    if (!gameArena || !isGameActive) return;
    const dotSize = getDotSize();
    const { x, y } = getRandomCoordinate(dotSize);
    const dot = document.createElement('div');
    dot.className = 'target-dot';
    dot.style.width = `${dotSize}px`;
    dot.style.height = `${dotSize}px`;
    dot.style.left = `${x}px`;
    dot.style.top = `${y}px`;
    dot.style.backgroundColor = getRandomPastelColor();
    dot.style.background = `radial-gradient(circle at 35% 35%, ${getRandomPastelColor()}, #c9b3e0)`;
    dot.addEventListener('click', dotClickHandler);
    gameArena.appendChild(dot);
    currentDot = dot;
  }

  function updateUI() {
    if (currentStageIdx === null) return;
    const percentDots = requiredDots === 999 ? Math.min(100, (dotsFound / requiredDots) * 100) : (dotsFound / requiredDots) * 100;
    dotsProgressFill.style.width = `${Math.min(100, percentDots)}%`;
    dotsPercentLabel.innerText = `${Math.floor(Math.min(100, percentDots))}%`;
    dotsCounterSpan.innerText = `${dotsFound} / ${requiredDots === 999 ? '∞' : requiredDots}`;
    targetDotsSpan.innerText = requiredDots === 999 ? '∞' : requiredDots;
  }

  function updateTimeProgress(remainingMs) {
    const percent = Math.max(0, (remainingMs / currentTimeLimitMs) * 100);
    timeProgressFill.style.width = `${percent}%`;
    timePercentLabel.innerText = `${Math.floor(percent)}%`;
  }

  function formatTime(ms) {
    const totalSec = Math.floor(ms / 1000);
    const minutes = Math.floor(totalSec / 60);
    const seconds = totalSec % 60;
    const millis = Math.floor(ms % 1000);
    return `${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}:${millis.toString().padStart(3,'0')}`;
  }

  function stopTimer() { if (timerInterval) { clearInterval(timerInterval); timerInterval = null; } }

  function startTimerUpdate() {
    if (timerInterval) stopTimer();
    timerInterval = setInterval(() => {
      if (!isGameActive || isPaused) return;
      const now = performance.now();
      const elapsed = (now - roundStartTime) + elapsedBeforePause;
      const remaining = Math.max(0, currentTimeLimitMs - elapsed);
      liveTimerSpan.innerText = formatTime(elapsed);
      updateTimeProgress(remaining);
      if (remaining <= 0 && isGameActive) {
        handleLoss();
      }
    }, 16);
  }

  function refreshTimerAfterCatch() {
    if (!isGameActive || isPaused) return;
    elapsedBeforePause = 0;
    roundStartTime = performance.now();
    liveTimerSpan.innerText = formatTime(0);
    updateTimeProgress(currentTimeLimitMs);
  }

  function showCongrats() {
    stopTimer();
    isGameActive = false;
    removeDot();
    
    const stage = STAGES[currentStageIdx];
    const isUnlimited = (stage.name === "unlimited");
    
    if (isUnlimited) {
      congratsTitle.innerText = "incredible!";
      congratsMessage.innerText = "woahhh, you passed unlimited! go find the developer to add more stage for you or keep entertaining yourself!";
    } else {
      congratsTitle.innerText = "stage complete!";
      congratsMessage.innerText = "you've passed this stage, move on to the next stage!";
    }
    congratsPopup.classList.add('active');
    pauseBtn.innerText = 'pause';
    infoMsg.innerText = stage.name + " completed! select next stage or keep playing.";
  }

  function dotClickHandler(e) {
    e.stopPropagation();
    if (!isGameActive || isPaused) return;
    
    dotsFound++;
    updateUI();
    if (dotsFound >= requiredDots) {
      showCongrats();
      return;
    }
    refreshTimerAfterCatch();
    spawnDot();
    
    if (requiredDots !== 999) {
      infoMsg.innerText = `+1 dot (${dotsFound}/${requiredDots})`;
    } else {
      infoMsg.innerText = `+1 · ${dotsFound} dots · keep going!`;
    }
    setTimeout(() => {
      if (isGameActive && !isPaused && (infoMsg.innerText.includes("+1") || infoMsg.innerText.includes("keep going"))) {
        infoMsg.innerText = `find the dot before time runs out`;
      }
    }, 700);
  }

  function handleLoss() {
    if (!isGameActive) return;
    stopTimer();
    isGameActive = false;
    isPaused = false;
    removeDot();
    dotsFound = 0;
    updateUI();
    liveTimerSpan.innerText = formatTime(0);
    updateTimeProgress(currentTimeLimitMs);
    lossPopup.classList.add('active');
    infoMsg.innerText = `time ran out. progress reset.`;
    pauseBtn.innerText = 'pause';
  }

  function startNewRound() {
    if (currentStageIdx === null) {
      infoMsg.innerText = `please select a stage first.`;
      return;
    }
    lossPopup.classList.remove('active');
    congratsPopup.classList.remove('active');
    stopTimer();
    isGameActive = false;
    removeDot();
    dotsFound = 0;
    requiredDots = STAGES[currentStageIdx].requiredDots;
    currentTimeLimitMs = STAGES[currentStageIdx].timeLimitSec * 1000;
    updateUI();
    liveTimerSpan.innerText = formatTime(0);
    updateTimeProgress(currentTimeLimitMs);
    isGameActive = true;
    isPaused = false;
    elapsedBeforePause = 0;
    roundStartTime = performance.now();
    spawnDot();
    startTimerUpdate();
    pauseBtn.innerText = 'pause';
    infoMsg.innerText = `${STAGES[currentStageIdx].name} · catch dots, timer resets each hit.`;
  }

  function restartStage() {
    if (currentStageIdx === null) {
      infoMsg.innerText = `select a stage first.`;
      return;
    }
    lossPopup.classList.remove('active');
    congratsPopup.classList.remove('active');
    stopTimer();
    isGameActive = false;
    removeDot();
    dotsFound = 0;
    requiredDots = STAGES[currentStageIdx].requiredDots;
    currentTimeLimitMs = STAGES[currentStageIdx].timeLimitSec * 1000;
    updateUI();
    liveTimerSpan.innerText = formatTime(0);
    updateTimeProgress(currentTimeLimitMs);
    isGameActive = true;
    isPaused = false;
    elapsedBeforePause = 0;
    roundStartTime = performance.now();
    spawnDot();
    startTimerUpdate();
    pauseBtn.innerText = 'pause';
    infoMsg.innerText = `restarted · ${STAGES[currentStageIdx].name}`;
  }
  function togglePause() {
    if (!isGameActive) {
      infoMsg.innerText = `no active game. press start game.`;
      return;
    }
    if (isPaused) {
      isPaused = false;
      roundStartTime = performance.now();
      startTimerUpdate();
      pauseBtn.innerText = 'pause';
      infoMsg.innerText = `resumed · find the dot`;
    } else {
      isPaused = true;
      if (timerInterval) {
        const now = performance.now();
        const elapsedNow = (now - roundStartTime) + elapsedBeforePause;
        elapsedBeforePause = elapsedNow;
        stopTimer();
      }
      pauseBtn.innerText = 'resume';
      infoMsg.innerText = `paused`;
    }
  }
  function goToNextStage() {
    if (currentStageIdx === null) return;
    congratsPopup.classList.remove('active');
    let nextIdx = currentStageIdx + 1;
    if (nextIdx >= STAGES.length) {
      if (currentStageIdx === STAGES.length - 1) {
        infoMsg.innerText = "✨ you completed all stages! replay any stage for fun. ✨";
        return;
      }
    }
    setStage(nextIdx);
    startNewRound();
  }
  function setStage(index) {
    if (isGameActive) {
      stopTimer();
      isGameActive = false;
      removeDot();
    }
    currentStageIdx = index;
    requiredDots = STAGES[currentStageIdx].requiredDots;
    currentTimeLimitMs = STAGES[currentStageIdx].timeLimitSec * 1000;
    dotsFound = 0;
    updateUI();
    liveTimerSpan.innerText = formatTime(0);
    updateTimeProgress(currentTimeLimitMs);
    isGameActive = false;
    isPaused = false;
    pauseBtn.innerText = 'pause';
    lossPopup.classList.remove('active');
    congratsPopup.classList.remove('active');
    removeDot();
    infoMsg.innerText = `${STAGES[currentStageIdx].name} selected. press start game.`;
    startStageBtn.classList.remove('hidden');
    renderLevelMenu();
  }
  function renderLevelMenu() {
    levelMenuDiv.innerHTML = '';
    STAGES.forEach((stage, idx) => {
      const card = document.createElement('div');
      card.className = 'level-card';
      if (currentStageIdx === idx) card.classList.add('active-level');
      const dotReqDisplay = stage.requiredDots === 999 ? '∞' : stage.requiredDots;
      card.innerHTML = `
        <div class="level-name">${stage.name}</div>
      `;
      card.addEventListener('click', (e) => {
        e.stopPropagation();
        setStage(idx);
        levelMenuDiv.classList.remove('show');
      });
      levelMenuDiv.appendChild(card);
    });
  }

  function toggleLevelMenu() {
    if (levelMenuDiv.classList.contains('show')) {
      levelMenuDiv.classList.remove('show');
    } else {
      renderLevelMenu();
      levelMenuDiv.classList.add('show');
    }
  }

  function handleResize() {
    if (!isGameActive || isPaused || !currentDot) return;
    const size = parseInt(currentDot.style.width);
    if (!isNaN(size)) {
      const { x, y } = getRandomCoordinate(size);
      currentDot.style.left = `${x}px`;
      currentDot.style.top = `${y}px`;
    }
  }
  window.addEventListener('resize', handleResize);
  selectStageBtn.addEventListener('click', toggleLevelMenu);
  startStageBtn.addEventListener('click', startNewRound);
  pauseBtn.addEventListener('click', togglePause);
  restartStageBtn.addEventListener('click', () => {
    if (currentStageIdx === null) {
      infoMsg.innerText = `select a stage first (click 'select stage')`;
      return;
    }
    lossPopup.classList.remove('active');
    congratsPopup.classList.remove('active');
    restartStage();
  });
  popupRestart.addEventListener('click', () => {
    lossPopup.classList.remove('active');
    if (currentStageIdx !== null) restartStage();
    else infoMsg.innerText = `pick a stage first.`;
  });
  popupChangeStage.addEventListener('click', () => {
    lossPopup.classList.remove('active');
    toggleLevelMenu();
    infoMsg.innerText = `choose a new stage.`;
  });
  nextStageBtn.addEventListener('click', goToNextStage);
  congratsChangeStageBtn.addEventListener('click', () => {
    congratsPopup.classList.remove('active');
    toggleLevelMenu();
    infoMsg.innerText = `select a new stage to continue.`;
  });
  currentStageIdx = null;
  startStageBtn.classList.add('hidden');
  targetDotsSpan.innerText = '0';
  dotsCounterSpan.innerText = `0 / 0`;
  updateTimeProgress(1000);
  renderLevelMenu();
  infoMsg.innerText = `pick a stage → start game. timer resets after each catch!`;
</script>
</body>
</html>
